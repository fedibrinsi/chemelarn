<svg width="1400" height="700" viewBox="0 0 1400 700" fill="none" xmlns="http://www.w3.org/2000/svg">
  <rect width="1400" height="700" rx="28" fill="#FAFFFC"/>
  <rect x="30" y="30" width="1340" height="640" rx="24" fill="#FFFFFF" stroke="#D6E7DF"/>
  <text x="70" y="95" font-family="Segoe UI" font-size="34" font-weight="700" fill="#0F4B56">Diagnostic d'un espace durable</text>

  <g transform="translate(70,140)">
    <rect width="600" height="210" rx="18" fill="#FFF4EF" stroke="#F0C8BA"/>
    <text x="24" y="44" font-family="Segoe UI" font-size="22" font-weight="700" fill="#A34B34">Données observées</text>
    <text x="24" y="84" font-family="Segoe UI" font-size="18" fill="#6D3E31">• 500 bouteilles jetables par semaine</text>
    <text x="24" y="116" font-family="Segoe UI" font-size="18" fill="#6D3E31">• 3 robinets qui fuient</text>
    <text x="24" y="148" font-family="Segoe UI" font-size="18" fill="#6D3E31">• Lumières allumées dans des salles vides</text>
    <text x="24" y="180" font-family="Segoe UI" font-size="18" fill="#6D3E31">• Faible participation de certains groupes</text>
  </g>

  <g transform="translate(730,140)">
    <rect width="600" height="430" rx="18" fill="#EEF8F5" stroke="#BCE3D9"/>
    <text x="24" y="44" font-family="Segoe UI" font-size="22" font-weight="700" fill="#145A50">Plan d'action systémique</text>
    <text x="24" y="90" font-family="Segoe UI" font-size="18" fill="#1F5A52">1) Installer des fontaines et des gourdes réutilisables</text>
    <text x="24" y="126" font-family="Segoe UI" font-size="18" fill="#1F5A52">2) Réparer les fuites d'eau</text>
    <text x="24" y="162" font-family="Segoe UI" font-size="18" fill="#1F5A52">3) Optimiser l'éclairage (LED + extinction intelligente)</text>
    <text x="24" y="198" font-family="Segoe UI" font-size="18" fill="#1F5A52">4) Rendre les clubs plus inclusifs</text>

    <rect x="24" y="240" width="552" height="160" rx="14" fill="#FFFFFF" stroke="#C5DDD7"/>
    <text x="44" y="276" font-family="Segoe UI" font-size="18" font-weight="700" fill="#234A45">ODD activés:</text>
    <text x="44" y="308" font-family="Segoe UI" font-size="17" fill="#355D57">• ODD 6 (eau) • ODD 12 (consommation) • ODD 13 (climat)</text>
    <text x="44" y="336" font-family="Segoe UI" font-size="17" fill="#355D57">• ODD 4 (apprentissage actif) • ODD 17 (coopération)</text>
    <text x="44" y="366" font-family="Segoe UI" font-size="17" fill="#355D57">• ODD 3 (bien-être via environnement sain)</text>
  </g>

  <text x="70" y="620" font-family="Segoe UI" font-size="20" fill="#4D607A">Question: Quel plan répond au plus grand nombre d'ODD?</text>
</svg>